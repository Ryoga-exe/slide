<!doctype html>

}

}

@property --out {
  syntax: "<integer>";
  inherits: true;
  initial-value: 0;
}

}

:root {
  --seg7-data: calc((calc((calc((calc((8) * (var(--d0)))) + (calc((4) * (var(--d1)))))) + (calc((2) * (var(--d2)))))) + (calc((1) * (var(--d3)))));
  --out: var(--seg7-data);
  --veryl-cond-0: --veryl-eq(var(--seg7-data), 0);
  --veryl-cond-1: --veryl-eq(var(--seg7-data), 1);
  --veryl-cond-2: --veryl-eq(var(--seg7-data), 2);
  --veryl-cond-3: --veryl-eq(var(--seg7-data), 3);
  --veryl-cond-4: --veryl-eq(var(--seg7-data), 4);
  --veryl-cond-5: --veryl-eq(var(--seg7-data), 5);
  --veryl-cond-6: --veryl-eq(var(--seg7-data), 6);
  --veryl-cond-7: --veryl-eq(var(--seg7-data), 7);
  --veryl-cond-8: --veryl-eq(var(--seg7-data), 8);
  --veryl-cond-9: --veryl-eq(var(--seg7-data), 9);
  --seg7-seg: if(style(--veryl-cond-0: 1): 63; else: if(style(--veryl-cond-1: 1): 6; else: if(style(--veryl-cond-2: 1): 91; else: if(style(--veryl-cond-3: 1): 79; else: if(style(--veryl-cond-4: 1): 102; else: if(style(--veryl-cond-5: 1): 109; else: if(style(--veryl-cond-6: 1): 125; else: if(style(--veryl-cond-7: 1): 7; else: if(style(--veryl-cond-8: 1): 127; else: if(style(--veryl-cond-9: 1): 111; else: 0))))))))));
  --s0: mod(var(--seg7-seg), 2);
  --s1: mod(round(down, var(--seg7-seg) / 2), 2);
  --s2: mod(round(down, var(--seg7-seg) / 4), 2);
  --s3: mod(round(down, var(--seg7-seg) / 8), 2);
  --s4: mod(round(down, var(--seg7-seg) / 16), 2);
  --s5: mod(round(down, var(--seg7-seg) / 32), 2);
  --s6: mod(round(down, var(--seg7-seg) / 64), 2);
}

    </style>
    <style>
      :root:has(input[id="a"]:checked) { --d0: 1; }
      :root:has(input[id="b"]:checked) { --d1: 1; }
      :root:has(input[id="c"]:checked) { --d2: 1; }
      :root:has(input[id="d"]:checked) { --d3: 1; }
      .out::after {
        counter-reset: val var(--out);
        content: counter(val);
      }
      .in {
        display: grid;
        grid-template: repeat(2, 2rem) / repeat(4, 2rem);
        justify-content: center;
        justify-items: center;

        > label {
          font-size: 1.5rem;
          cursor: pointer;
        }
        > input {
          width: 1.5rem;
          cursor: pointer;
        }
      }
      .out {
        text-align: center;
        font-size: 2rem;
      }
      @function --fill(--val) {
        result: rgba(calc(255 * var(--val)), 0, 0, calc((1 + 4 * var(--val)) / 5));
      }
      .seg {
        width: 1px;
        margin: 2rem auto;
        position: relative;
        span {
          position: absolute;
          display: block;
          background: black;
          border-radius: 15px;
          transform: translate(-50%, -50%);
          left: 0;
          width: 20px;
          height: 100px;
        }
        span:nth-child(1) {
          width: 100px;
          height: 20px;
          top: 0;
          background: --fill(var(--s0));
        }
        span:nth-child(2) {
          top: 50px;
          left: 50px;
          background: --fill(var(--s1));
        }
        span:nth-child(3) {
          top: 150px;
          left: 50px;
          background: --fill(var(--s2));
        }
        span:nth-child(4) {
          width: 100px;
          height: 20px;
          top: 200px;
          background: --fill(var(--s3));
        }
        span:nth-child(5) {
          top: 150px;
          left: -50px;
          background: --fill(var(--s4));
        }
        span:nth-child(6) {
          top: 50px;
          left: -50px;
          background: --fill(var(--s5));
        }
        span:nth-child(7) {
          width: 100px;
          height: 20px;
          top: 100px;
          background: --fill(var(--s6));
        }
      }
    </style>
  </head>
  <body>
    <div class="in">
      <label for="a">8</label>
      <label for="b">4</label>
      <label for="c">2</label>
      <label for="d">1</label>
      <input id="a" type="checkbox" />
      <input id="b" type="checkbox" />
      <input id="c" type="checkbox" />
      <input id="d" type="checkbox" />
    </div>
    <div class="out"></div>
    <div class="seg">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>
  </body>
</html>
